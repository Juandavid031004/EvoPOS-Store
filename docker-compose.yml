version: '3.8'

services:
  client:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: evopos-client
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - evopos-network
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - VITE_API_URL=https://hostybee.com

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: evopos-server  
    ports:
      - "3000:3000"
    volumes:
      - db-data:/data/db
    environment:
      - NODE_ENV=production
      - DB_PATH=/data/db/database.db
    networks:
      - evopos-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  evopos-network:
    driver: bridge

volumes:
  db-data:
    driver: local